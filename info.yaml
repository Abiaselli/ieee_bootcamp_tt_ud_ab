# Tiny Tapeout project information
project:
  title:        "Fixed-point UD Izhikevich Neuron"      # Project title
  author:       "Austin Biaselli"      # Your name
  discord:      "auslander3951"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "This is a circuit implementation of the Izhikevich model system of differential equations for neuronal spiking."      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     1000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_abiaselli_UDIZH1"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  ui[0]: "step enable"
  ui[1]: "I current bit 0"
  ui[2]: "I current bit 1"
  ui[3]: "I current bit 2"
  ui[4]: "I current bit 3"
  ui[5]: "I current bit 4"
  ui[6]: "I current bit 5"
  ui[7]: "I current bit 6"

#output
  uo[0]: "v display bit 0"
  uo[1]: "v display bit 1"
  uo[2]: "v display bit 2"
  uo[3]: "v display bit 3"
  uo[4]: "v display bit 4"
  uo[5]: "v display bit 5"
  uo[6]: "v display bit 6"
  uo[7]: "v display bit 7 / spike all-high"

#bi-directional
  uio[0]: "u display bit 0"
  uio[1]: "u display bit 1"
  uio[2]: "u display bit 2"
  uio[3]: "u display bit 3"
  uio[4]: "u display bit 4"
  uio[5]: "u display bit 5"
  uio[6]: "u display bit 6"
  uio[7]: "u display bit 7"

  uio[7]: ""

# Do not change!
yaml_version: 6
