# Tiny Tapeout project information
project:
  title: "Analog Izhikevich Neuron"
  author: "Austin Biaselli"
  discord: "auslander3951"
  description: "Mixed-signal SKY130 Izhikevich neuron with analog V/U/VD/VC pins and digital ACK/REQ"
  language: "Analog"
  clock_hz: 0
  tiles: "1x2"
  analog_pins: 4
  uses_3v3: false
  top_module: "tt_um_abiaselli_UDIZH1"
  source_files:
    - "project.v"

# Pin descriptions for datasheet/website. Leave unused pins blank; do not add/delete pins.
pinout:
  # Dedicated digital inputs
  ui[0]: "ACK_IN - digital acknowledge/reset input"
  ui[1]: "POLARITY_INV - invert ACK/REQ digital handshake convention"
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Dedicated digital outputs
  uo[0]: "REQ_OUT - digital request/spike output"
  uo[1]: ""
  uo[2]: ""
  uo[3]: ""
  uo[4]: ""
  uo[5]: ""
  uo[6]: ""
  uo[7]: ""

  # Bidirectional digital pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

  # Analog pins - analog_pins above must match the number used here.
  ua[0]: "V / ISYN - membrane node and external input-current injection node"
  ua[1]: "U - recovery-variable node / external recovery-control access"
  ua[2]: "VD - recovery increment/reset bias voltage"
  ua[3]: "VC - membrane reset bias voltage"
  ua[4]: ""
  ua[5]: ""

