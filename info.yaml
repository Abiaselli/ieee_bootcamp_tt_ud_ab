# Tiny Tapeout project information
project:
  title: "Analog Izhikevich Neuron"
  author: "Austin Biaselli"
  discord: "auslander3951"
  description: "Mixed-signal SKY130 Izhikevich neuron with four analog control pins and digital ACK/REQ handshake"
  language: "Analog"
  clock_hz: 0

  # SKY130 analog projects are 1x2 or 2x2. This version targets the 1x2 analog template.
  tiles: "1x2"

  # Four paid/connected analog pins: ua[0] through ua[3]. Use pins in order starting from ua[0].
  analog_pins: 4

  # Set true only if the custom layout uses the optional 3.3 V VAPWR rail and the _3v3 DEF template.
  uses_3v3: false

  # Must match the Verilog stub module name and the final GDS/LEF top cell name.
  top_module: "tt_um_abiaselli_UDIZH1"

  # Source files must live in ./src. Put the wrapper stub at ./src/project.v.
  source_files:
    - "project.v"

# Pin descriptions for the datasheet/website. Leave unused pins blank; do not add or remove pins.
pinout:
  # Dedicated digital inputs
  ui[0]: "ACK - acknowledge/reset pulse to analog neuron, active high"
  ui[1]: ""
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Dedicated digital outputs
  uo[0]: "REQ_N - active-low request/spike output from analog neuron"
  uo[1]: ""
  uo[2]: ""
  uo[3]: ""
  uo[4]: ""
  uo[5]: ""
  uo[6]: ""
  uo[7]: ""

  # Bidirectional digital pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

  # Analog pins - analog_pins above must match the number used here.
  ua[0]: "V / ISYN - membrane capacitor node and external input-current injection node"
  ua[1]: "VDD_B - adjustable analog neuron supply/bias"
  ua[2]: "VD - recovery increment/reset bias voltage"
  ua[3]: "VC - membrane reset bias voltage"
  ua[4]: ""
  ua[5]: ""

# Do not change!
yaml_version: 6
